<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Booking Ledger</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <meta name="csrf-token" content="{{ csrf_token or '' }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="sticky top-0 z-50 border-b border-slate-200/60 bg-slate-900/95 text-white shadow-sm backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4" style="font-family: 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;">
            <a href="/" class="flex items-center gap-3 text-lg font-semibold tracking-wide">
                <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-white/10 text-sm font-bold">G</span>
                <span>Genset</span>
            </a>
            {% set current_path = request.url.path %}
            <div class="flex items-center gap-3 overflow-x-auto whitespace-nowrap px-2 py-1 sm:overflow-visible sm:whitespace-normal">
                {% if user %}
                    <a href="/create-booking" class="rounded-full bg-amber-400 px-3 py-1.5 text-xs font-semibold text-amber-950 shadow-sm transition hover:bg-amber-300">Create Booking</a>
                    <div class="relative">
                        <button id="userMenuButton" type="button" class="flex items-center gap-2 rounded-full border border-white/15 bg-white/10 px-3 py-1.5 text-xs font-semibold text-white/90 focus:outline-none">
                            <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-white/15 text-xs font-semibold">
                                {{ user.username[:2] | upper }}
                            </span>
                            <div class="text-left">
                                <div class="text-xs font-semibold">{{ user.username }}</div>
                                <div class="text-[10px] uppercase tracking-[0.2em] text-white/60">{{ user.role }}</div>
                            </div>
                        </button>
                        <div id="userMenu" class="absolute right-0 mt-2 w-48 rounded-xl border border-slate-200 bg-white text-sm text-slate-800 shadow-lg overflow-hidden hidden">
                            <a href="/billing" class="block px-4 py-2 hover:bg-slate-100 {{ 'text-slate-900 font-semibold' if current_path.startswith('/billing') else 'text-slate-700' }}">Billing</a>
                            <a href="/history" class="block px-4 py-2 hover:bg-slate-100 {{ 'text-slate-900 font-semibold' if current_path.startswith('/history') else 'text-slate-700' }}">History</a>
                            {% if user.role == 'admin' %}
                            <a href="/admin/settings" class="block px-4 py-2 hover:bg-slate-100 {{ 'text-slate-900 font-semibold' if current_path.startswith('/admin/settings') else 'text-slate-700' }}">Settings</a>
                            {% endif %}
                            <a href="/logout?csrf_token={{ csrf_token }}" class="block px-4 py-2 hover:bg-slate-100 text-slate-700">Logout</a>
                        </div>
                    </div>
                {% else %}
                    <a href="/login" class="border-b-2 border-transparent pb-1 flex items-center gap-2 rounded-full border-white/20 px-3 py-1.5 text-sm font-medium text-white/90 transition hover:border-white/50 hover:text-white {{ 'border-white/80 text-white' if current_path.startswith('/login') else '' }}">
                        <span class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-white/15 text-xs font-semibold">GS</span>
                        Login
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}
    
    <footer class="footer">
        <p>&copy; 2026 Generator Booking Ledger v2.0</p>
    </footer>
    
    <script>
        (function() {
            const meta = document.querySelector('meta[name="csrf-token"]');
            const csrfToken = meta ? meta.getAttribute('content') : '';
            if (!csrfToken) return;
            const originalFetch = window.fetch;
            window.fetch = function(input, init) {
                const options = init || {};
                const method = (options.method || (input && input.method) || 'GET').toUpperCase();
                if (method !== 'GET' && method !== 'HEAD' && method !== 'OPTIONS') {
                    const headers = new Headers(options.headers || {});
                    if (!headers.has('X-CSRF-Token')) {
                        headers.set('X-CSRF-Token', csrfToken);
                    }
                    options.headers = headers;
                }
                return originalFetch(input, options);
            };
        })();
    </script>
    <script>
        (function() {
            const button = document.getElementById('userMenuButton');
            const menu = document.getElementById('userMenu');
            if (!button || !menu) return;
            const toggle = () => menu.classList.toggle('hidden');
            const close = (event) => {
                if (!menu.classList.contains('hidden') && !menu.contains(event.target) && !button.contains(event.target)) {
                    menu.classList.add('hidden');
                }
            };
            button.addEventListener('click', (e) => {
                e.stopPropagation();
                toggle();
            });
            document.addEventListener('click', close);
            window.addEventListener('blur', () => menu.classList.add('hidden'));
        })();
    </script>
    <script src="/static/js/main.js"></script>
</body>
</html>

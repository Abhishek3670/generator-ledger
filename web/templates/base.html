<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Booking Ledger</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="sticky top-0 z-50 border-b border-slate-200/60 bg-slate-900/95 text-white shadow-sm backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4" style="font-family: 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;">
            <a href="/" class="flex items-center gap-3 text-lg font-semibold tracking-wide">
                <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-white/10 text-sm font-bold">G</span>
                <span>Genset</span>
            </a>
            <div class="flex items-center gap-4">
                {% if user %}
                    <a href="/history" class="text-sm font-medium text-white/80 transition hover:text-white">History</a>
                    {% if user.role == 'admin' %}
                        <a href="/admin/users" class="text-sm font-medium text-white/80 transition hover:text-white">Users</a>
                    {% endif %}
                    <div class="flex items-center gap-2 rounded-full border border-white/20 px-3 py-1.5 text-xs font-semibold text-white/90">
                        <span class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-white/15 text-xs font-semibold">
                            {{ user.username[:2] | upper }}
                        </span>
                        <div class="text-left">
                            <div class="text-xs font-semibold">{{ user.username }}</div>
                            <div class="text-[10px] uppercase tracking-[0.2em] text-white/60">{{ user.role }}</div>
                        </div>
                    </div>
                    <a href="/logout" class="text-sm font-medium text-white/80 transition hover:text-white">Logout</a>
                {% else %}
                    <a href="/login" class="flex items-center gap-2 rounded-full border border-white/20 px-3 py-1.5 text-sm font-medium text-white/90 transition hover:border-white/40 hover:text-white">
                        <span class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-white/15 text-xs font-semibold">GS</span>
                        Login
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}
    
    <footer class="footer">
        <p>&copy; 2026 Generator Booking Ledger v2.0</p>
    </footer>
    
    <script src="/static/js/main.js"></script>
</body>
</html>

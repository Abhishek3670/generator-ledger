<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Generator Booking Ledger</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 via-white to-slate-100">
    <div class="mx-auto flex min-h-screen max-w-6xl items-center justify-center px-4 py-10" style="font-family: 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;">
        <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
            <div class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Access</div>
            <h1 class="mt-2 text-2xl font-semibold text-slate-900">Sign in</h1>
            <p class="mt-1 text-sm text-slate-500">Use your username and password to continue.</p>

            {% if error %}
            <div class="mt-4 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login" class="mt-6 space-y-4">
                <div>
                    <label for="username" class="text-sm font-semibold text-slate-700">Username</label>
                    <input type="text" id="username" name="username" required class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-700 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200">
                </div>
                <div>
                    <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
                    <input type="password" id="password" name="password" required class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-700 shadow-sm focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200">
                </div>
                <button type="submit" class="w-full rounded-full bg-slate-900 px-6 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>

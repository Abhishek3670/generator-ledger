services:
  web:
    image: "generator-ledger:${APP_IMAGE_TAG:?APP_IMAGE_TAG not set}"
    build: .
    container_name: generator-ledger-web
    ports:
      - "${DOCKER_HOST_PORT:-8001}:8000"
    volumes:
      - ./Data:/app/Data
      - ./exported_data:/app/exported_data
      - ./archives:/app/archives
      - ./ledger.db:/app/ledger.db
    environment:
      - DB_PATH=/app/ledger.db
      - HOST=${HOST:-0.0.0.0}
      - PORT=8000
      - DEBUG=${DEBUG:-false}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET not set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET not set}
      - OWNER_USERNAME=${OWNER_USERNAME:?OWNER_USERNAME not set}
      - OWNER_PASSWORD=${OWNER_PASSWORD:?OWNER_PASSWORD not set}
      - LOAD_SEED_DATA=${LOAD_SEED_DATA:-false}
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-gbl_session}
      - SESSION_TTL_MINUTES=${SESSION_TTL_MINUTES:-480}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  ledger_data:
